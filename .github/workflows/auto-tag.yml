name: Auto Tag on Proto Changes

on:
  push:
    branches:
      - main
    paths:
      - 'proto/**/*.proto'
  pull_request:
    branches:
      - main
    paths:
      - 'proto/**/*.proto'

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v42
        with:
          files: proto/**/*.proto

      - name: Determine bump type
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          if [[ "$COMMIT_MSG" == *"BREAKING CHANGE"* ]] || [[ "$COMMIT_MSG" == *"major:"* ]]; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" == *"feat:"* ]] || [[ "$COMMIT_MSG" == *"minor:"* ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Create tags for changed services
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          BUMP_TYPE=${{ steps.check_commit.outputs.bump }}
          
          # Extract service names (directory name under proto/)
          SERVICES=$(echo "${{ steps.changed.outputs.all_changed_files }}" | tr ' ' '\n' | awk -F'/' '{print $2}' | sort -u)
          
          for SERVICE in $SERVICES; do
            if [ -z "$SERVICE" ]; then continue; fi
            echo "Processing service: $SERVICE"
            
            LATEST_TAG=$(git describe --tags --match "$SERVICE/v*" --abbrev=0 2>/dev/null || echo "$SERVICE/v1.0.0")
            echo "Latest tag for $SERVICE: $LATEST_TAG"
            
            VERSION=${LATEST_TAG#$SERVICE/v}
            IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
            
            MAJOR=${VERSION_PARTS[0]:-1}
            MINOR=${VERSION_PARTS[1]:-0}
            PATCH=${VERSION_PARTS[2]:-0}
            
            if [ "$BUMP_TYPE" = "major" ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif [ "$BUMP_TYPE" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            
            NEW_TAG="$SERVICE/v${MAJOR}.${MINOR}.${PATCH}"
            echo "New tag: $NEW_TAG"
            
            git tag $NEW_TAG
            git push origin $NEW_TAG
          done
