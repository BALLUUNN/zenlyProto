name: Generate gRPC Code

on:
  push:
    branches:
      - main
    paths:
      - 'proto/**/*.proto'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - 'proto/**/*.proto'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/*.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 'latest'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@latest

      - name: Buf dep update
        run: buf dep update

      - name: Buf lint
        run: buf lint

      - name: Fetch repository history
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune --depth=1 origin +refs/heads/main:refs/remotes/origin/main

      - name: Buf breaking change detection
        if: github.event_name == 'pull_request'
        continue-on-error: true 
        run: buf breaking --against '.git#branch=origin/main'

      - name: Generate code
        run: buf generate

      - name: Verify no uncommitted changes
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          cp gen/openapiv2/api.swagger.json docs/api.swagger.json 2>/dev/null || true
          sed -i 's|../gen/openapiv2/api.swagger.json|api.swagger.json|g' docs/index.html 2>/dev/null || true
          git add gen/ docs/ buf.lock
          if ! git diff --staged --quiet; then
            echo "Error: Found uncommitted generated files. Please run 'make generate' locally and commit the result."
            git diff --staged
            exit 1
          fi

